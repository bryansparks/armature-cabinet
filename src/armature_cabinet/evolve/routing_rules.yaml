# src/armature_cabinet/evolve/routing_rules.yaml
# v1 routing table. The router is data-driven: thresholds and which surfaces are
# review-locked can be tuned here without touching router.py.
min_observations: 3            # a symptom must appear this many times to fire
hqs_promote_min: 0.02         # promote a new version only if HQS improved by >= this
auto_rollback_guardrail: true # roll back automatically if a guardrail-touched run regresses

surfaces:
  skills: auto
  mandate: auto
  "skills+soul": auto
  guardrail: review            # hard-locked: --apply cannot override
  lora_eligible: none           # handled by lora_handoff, not patch_applier
  none: none

rules:
  - id: R1
    symptom: OUTPUT_INVALID
    when_skill_attributable: true
    target_file: "skills/{skill_id}.md"
    surface: skills
  - id: R2
    symptom: OUTPUT_INVALID
    when_skill_attributable: false
    target_file: "mandate.md"
    surface: mandate
  - id: R3
    symptom: LOW_SKILL_ACTIVATION
    target_file: "skills/{skill_id}.md"
    surface: "skills+soul"
  - id: G1
    symptom: REFUSAL_OR_FALSE_HALT
    target_file: "brakes.md"
    surface: guardrail
  - id: G2
    symptom: HALLUCINATION_OR_UNCITED
    target_file: "trust.yaml"
    surface: guardrail